# workflow name (override name defined on the RO-Crate metadata)
name: test-galaxy-wf

# worklow visibility
public: false

# Issue Checker Settings
issues:
  # Enable/Disable issue checker
  # The list of issue types can be found @ <LIFEMONITOR_API_URL>/workflows/issues
  # (e.g., https://api.lifemonitor.eu/workflows/issues)
  check: true
  # csv of issues to check (all included by default)
  # include: [repo_layout.GitRepositoryWithoutMainBranch, repo_layout.MissingWorkflowFile, repo_layout.MissingROCrateFile, repo_layout.MissingROCrateWorkflowFile, repo_layout.RepositoryNotInitialised, lm.MissingLMConfigFile, lm.InvalidConfigFile, lm.UnknownLifeMonitorInstance, metadata.InvalidMetadataFile, metadata.MissingWorkflowName, experimental.OutdatedROCrateFile]
  # csv of issues to ignore (none ignored by default)
  # exclude: [repo_layout.GitRepositoryWithoutMainBranch, repo_layout.MissingWorkflowFile, repo_layout.MissingROCrateFile, repo_layout.MissingROCrateWorkflowFile, repo_layout.RepositoryNotInitialised, lm.MissingLMConfigFile, lm.InvalidConfigFile, lm.UnknownLifeMonitorInstance, metadata.InvalidMetadataFile, metadata.MissingWorkflowName, experimental.OutdatedROCrateFile]


# Github Integration Settings
push:
  branches: 
    # Define the list of branches to watch
    # - name: feature/XXX                   # Wildcards can be used to specify branches (e.g., feature/*)
    #   enable_notifications: true          # Enable to notify LifeMonitor and possibly also workflow registries
    #                                       # such as WorkflowHub (wfhub) and dev.WorkflowHub (wfhubdev).
    #                                       #   Default: true
    #   lifemonitor_instance:               # Specify the LifeMonitor instance to notify.
    #                                       # The value must match a configured proxy entry name.
    #                                       # Available instances on this system:
    #                                       #   [default, development, production]
    #   update_registries: []               # Workflow registries to be notified. Options are listed
    #                                       # by the endpoint `<lifemonitor_url>/registries`
    #                                       #   Default: []
    #                                       # (e.g., https://api.lifemontor.eu/registries)
    #
    # An example:
    #
    # - name: "develop"
    #   enable_notifications: true
    #   lifemonitor_instance: default
    #   update_registries: []

    # Monitor master.
    - name: "master"
      enable_notifications: true
      lifemonitor_instance: "development"
      update_registries: []


  tags:
    # Define the list of **tags** to watch.
    # The same fields that are applied to 'branches' (above) are also valid for tags.
    #
    # Example:
    # - name: "v*.*.*"  # e.g,. v1.0.2
    #   enable_notifications: true
    #   lifemonitor_instance: default
    #   update_registries: []

    # Recognize tags with names matching "v*.*.*" as new releases.
    - name: "v*.*.*"
      enable_notifications: true
      lifemonitor_instance: "default"
      update_registries: [wfhubdev]

    # Also recognize the tag names matching "*.*.*". For the rest, same rules as above.
    - name: "*.*.*"
      enable_notifications: true
      lifemonitor_instance: "default"
      update_registries: [wfhubdev]
